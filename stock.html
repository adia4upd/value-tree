<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Tree — 제품 수량 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f5f3ef;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem 4rem;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  padding: 2rem 2rem 2.5rem;
  width: 100%;
  max-width: 540px;
}

.header {
  text-align: center;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid #eee;
}
.header .logo { font-size: 13px; color: #a09070; letter-spacing: 2px; margin-bottom: 8px; }
.header h1 { font-size: 22px; font-weight: 700; color: #2c2c2c; }
.header p { font-size: 13px; color: #999; margin-top: 6px; }

.field { margin-bottom: 1.2rem; }
.field label { display: block; font-size: 13px; font-weight: 700; color: #555; margin-bottom: 6px; }
.field input[type="text"],
.field input[type="date"] {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #e0dcd4;
  border-radius: 8px;
  font-size: 14px; color: #333;
  font-family: 'Noto Sans KR', sans-serif;
  transition: border-color 0.2s;
  background: #faf9f7;
}
.field input:focus {
  outline: none;
  border-color: #8fb87a;
  background: #fff;
}

.section-label {
  font-size: 12px; font-weight: 700; color: #8fb87a;
  letter-spacing: 1px; text-transform: uppercase;
  margin: 1.6rem 0 0.8rem;
  padding-bottom: 6px;
  border-bottom: 1px solid #eee;
}

.product-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border: 1.5px solid #e8e4dc;
  border-radius: 10px;
  margin-bottom: 8px;
  background: #faf9f7;
  transition: border-color 0.2s, background 0.2s;
}
.product-row:hover { border-color: #c5d9b8; background: #f5faf2; }

.product-name { font-size: 14px; font-weight: 600; color: #333; }
.product-sub { font-size: 12px; color: #999; margin-top: 2px; }

.qty-wrap { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 30px; height: 30px;
  border: 1.5px solid #d8d4cc;
  border-radius: 6px; background: #fff;
  font-size: 18px; color: #555;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  line-height: 1; transition: border-color 0.2s, color 0.2s;
}
.qty-btn:hover { border-color: #8fb87a; color: #8fb87a; }
.qty-val {
  width: 36px; text-align: center;
  font-size: 15px; font-weight: 700; color: #333;
}

.submit-btn {
  width: 100%; padding: 14px;
  background: #6d9b5f; color: #fff;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; margin-top: 2rem;
  transition: background 0.2s;
}
.submit-btn:hover { background: #5a8a4e; }
.submit-btn:disabled { background: #bbb; cursor: not-allowed; }

.result {
  display: none;
  text-align: center;
  padding: 2rem;
  color: #6d9b5f;
  font-size: 15px;
  font-weight: 600;
}
.result .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">VALUE TREE</div>
    <h1>제품 수량 관리</h1>
    <p>제품별 수량을 입력하고 제출해주세요</p>
  </div>

  <form id="stockForm">
    <div class="field">
      <label>이름 *</label>
      <input type="text" id="name" placeholder="이름을 입력해 주세요" required>
    </div>
    <div class="field">
      <label>등록 날짜 *</label>
      <input type="date" id="regDate" required>
    </div>

    <div class="section-label">제품 수량</div>

    <div class="product-row">
      <div>
        <div class="product-name">① Alpha GPC</div>
        <div class="product-sub">알파지피씨</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" onclick="chg('q1',-1)">−</button>
        <div class="qty-val" id="q1">0</div>
        <button type="button" class="qty-btn" onclick="chg('q1',1)">+</button>
      </div>
    </div>

    <div class="product-row">
      <div>
        <div class="product-name">② NMN</div>
        <div class="product-sub">엔엠엔</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" onclick="chg('q2',-1)">−</button>
        <div class="qty-val" id="q2">0</div>
        <button type="button" class="qty-btn" onclick="chg('q2',1)">+</button>
      </div>
    </div>

    <div class="product-row">
      <div>
        <div class="product-name">③ SUPER PROST AID</div>
        <div class="product-sub">전립선</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" onclick="chg('q3',-1)">−</button>
        <div class="qty-val" id="q3">0</div>
        <button type="button" class="qty-btn" onclick="chg('q3',1)">+</button>
      </div>
    </div>

    <div class="product-row">
      <div>
        <div class="product-name">④ JOINT CARE</div>
        <div class="product-sub">관절</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" onclick="chg('q4',-1)">−</button>
        <div class="qty-val" id="q4">0</div>
        <button type="button" class="qty-btn" onclick="chg('q4',1)">+</button>
      </div>
    </div>

    <div class="product-row">
      <div>
        <div class="product-name">⑤ GLUCOLYSE</div>
        <div class="product-sub">당뇨</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" onclick="chg('q5',-1)">−</button>
        <div class="qty-val" id="q5">0</div>
        <button type="button" class="qty-btn" onclick="chg('q5',1)">+</button>
      </div>
    </div>

    <div class="product-row">
      <div>
        <div class="product-name">⑥ 뉴본에이드</div>
        <div class="product-sub">혈관</div>
      </div>
      <div class="qty-wrap">
        <button type="button" class="qty-btn" onclick="chg('q6',-1)">−</button>
        <div class="qty-val" id="q6">0</div>
        <button type="button" class="qty-btn" onclick="chg('q6',1)">+</button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">제출하기</button>
  </form>

  <div class="result" id="result">
    <div class="icon">✅</div>
    <div>제출 완료!</div>
    <div style="font-size:13px; color:#999; margin-top:8px; font-weight:400;">스프레드시트에 저장되었습니다.</div>
    <button onclick="reset()" style="margin-top:1.2rem; padding:10px 24px; background:#6d9b5f; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Noto Sans KR',sans-serif;">새로 입력</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzdvCwNNnpHT10uODIjkf3dSBLoPYU5MWWDfxqhmWGmBPhC9jX2uTcy-BKABtRPIHTj/exec';

// 오늘 날짜 기본값
document.getElementById('regDate').value = new Date().toISOString().slice(0,10);

function chg(id, delta) {
  const el = document.getElementById(id);
  const val = parseInt(el.textContent) + delta;
  if (val >= 0 && val <= 99) el.textContent = val;
}

document.getElementById('stockForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '전송 중...';
  btn.disabled = true;

  const data = {
    '이름': name,
    '등록날짜': document.getElementById('regDate').value,
    'Alpha GPC 수량': document.getElementById('q1').textContent,
    'NMN 수량': document.getElementById('q2').textContent,
    'SUPER PROST AID 수량': document.getElementById('q3').textContent,
    'JOINT CARE 수량': document.getElementById('q4').textContent,
    'GLUCOLYSE 수량': document.getElementById('q5').textContent,
    '뉴본에이드 수량': document.getElementById('q6').textContent,
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    document.getElementById('stockForm').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  } catch(err) {
    alert('오류가 발생했습니다. 다시 시도해주세요.');
    btn.textContent = '제출하기';
    btn.disabled = false;
  }
});

function reset() {
  document.getElementById('stockForm').reset();
  document.getElementById('regDate').value = new Date().toISOString().slice(0,10);
  ['q1','q2','q3','q4','q5','q6'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('submitBtn').textContent = '제출하기';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('stockForm').style.display = 'block';
  document.getElementById('result').style.display = 'none';
}
</script>
</body>
</html>
